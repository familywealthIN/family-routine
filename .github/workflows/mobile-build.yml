name: Mobile Build (Android + iOS)

on:
  push:
    branches: [main, develop, agents-initial]
    paths:
      - 'apps/web-app/**'
      - 'packages/**'
      - 'android/**'
      - 'ios/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/mobile-build.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/web-app/**'
      - 'packages/**'
      - 'android/**'
      - 'ios/**'
      - '.github/workflows/mobile-build.yml'
  workflow_dispatch:
    inputs:
      smoke_test:
        description: 'Boot emulator/simulator and verify app launches'
        type: boolean
        required: false
        default: true

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'
  RUBY_VERSION: '3.2'

jobs:
  build-web:
    name: Build web bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate runtime config (placeholders for CI)
        working-directory: apps/web-app
        env:
          FCM_API_KEY: ${{ secrets.FCM_API_KEY }}
          FCM_AUTH_DOMAIN: ${{ secrets.FCM_AUTH_DOMAIN }}
          FCM_DATABASE_URL: ${{ secrets.FCM_DATABASE_URL }}
          FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
          FCM_STORAGE_BUCKET: ${{ secrets.FCM_STORAGE_BUCKET }}
          FCM_MESSAGING_SENDER_ID: ${{ secrets.FCM_MESSAGING_SENDER_ID }}
          FCM_APP_ID: ${{ secrets.FCM_APP_ID }}
          FCM_MEASUREMENT_ID: ${{ secrets.FCM_MEASUREMENT_ID }}
          GQL_URL: ${{ secrets.GQL_URL || 'https://api.routine.familywealth.in/graphql' }}
          GA_PUBLIC_KEY: ${{ secrets.GA_PUBLIC_KEY }}
          GA_CLIENT_ID: ${{ secrets.GA_CLIENT_ID }}
          GA_SERVER_CLIENT_ID: ${{ secrets.GA_SERVER_CLIENT_ID }}
          GA_ANDROID_CLIENT_ID: ${{ secrets.GA_ANDROID_CLIENT_ID }}
          GA_IOS_CLIENT_ID: ${{ secrets.GA_IOS_CLIENT_ID }}
          IS_DEVELOPMENT: 'false'
        run: node ./scripts/create-env.js

      - name: Build web app
        run: yarn workspace web-app build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web-app/dist
          retention-days: 7
          if-no-files-found: error

  build-android:
    name: Build Android (debug APK)
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web-app/dist

      - name: Provision google-services.json
        env:
          ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -n "$ANDROID_GOOGLE_SERVICES_JSON_B64" ]; then
            echo "$ANDROID_GOOGLE_SERVICES_JSON_B64" | base64 -d > android/app/google-services.json
            echo "Wrote google-services.json from secret"
          else
            echo "::warning::ANDROID_GOOGLE_SERVICES_JSON_B64 not set; building without google-services (push won't work)"
          fi

      - name: Capacitor sync (android)
        working-directory: apps/web-app
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release AAB (unsigned)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release AAB
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: ignore

  smoke-android:
    name: Smoke test Android (boot emulator + launch app)
    needs: build-android
    if: github.event_name != 'workflow_dispatch' || inputs.smoke_test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: artifacts

      - name: Locate APK
        id: locate
        run: |
          APK=$(find artifacts -name '*.apk' -print -quit)
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          ls -la artifacts

      - name: Boot emulator and verify app launches
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell input keyevent 82 || true
            adb install -r "${{ steps.locate.outputs.apk }}"
            adb shell am start -W -n com.routine.note/.MainActivity || \
              adb shell monkey -p com.routine.note -c android.intent.category.LAUNCHER 1
            sleep 10
            adb shell dumpsys window windows | grep -E 'mCurrentFocus|mFocusedApp' || true
            PID=$(adb shell pidof com.routine.note 2>/dev/null | tr -d '\r')
            if [ -z "$PID" ]; then
              PID=$(adb shell "ps -A | grep com.routine.note" 2>/dev/null | awk '{print $2}' | head -1 | tr -d '\r')
            fi
            if [ -z "$PID" ]; then
              echo "::error::App process com.routine.note is not running"
              adb logcat -d -t 300 '*:E'
              exit 1
            fi
            echo "App is running with PID $PID"
            adb logcat -d --pid="$PID" | tail -40 || true
            adb exec-out screencap -p > app-screenshot.png

      - name: Upload smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-screenshot
          path: app-screenshot.png
          if-no-files-found: warn

  build-ios:
    name: Build iOS (unsigned)
    needs: build-web
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: false

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/App/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/App/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web-app/dist

      - name: Provision GoogleService-Info.plist
        env:
          IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
        run: |
          if [ -n "$IOS_GOOGLE_SERVICE_INFO_PLIST_B64" ]; then
            echo "$IOS_GOOGLE_SERVICE_INFO_PLIST_B64" | base64 -d > ios/App/App/GoogleService-Info.plist
            echo "Wrote GoogleService-Info.plist from secret"
          else
            echo "::warning::IOS_GOOGLE_SERVICE_INFO_PLIST_B64 not set; writing placeholder so build succeeds"
            cat > ios/App/App/GoogleService-Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CLIENT_ID</key><string>0-placeholder.apps.googleusercontent.com</string>
            <key>REVERSED_CLIENT_ID</key><string>com.googleusercontent.apps.0-placeholder</string>
            <key>API_KEY</key><string>placeholder</string>
            <key>GCM_SENDER_ID</key><string>0</string>
            <key>PLIST_VERSION</key><string>1</string>
            <key>BUNDLE_ID</key><string>com.routine.note</string>
            <key>PROJECT_ID</key><string>placeholder</string>
            <key>STORAGE_BUCKET</key><string>placeholder.appspot.com</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><true/>
            <key>IS_GCM_ENABLED</key><true/>
            <key>IS_SIGNIN_ENABLED</key><true/>
            <key>GOOGLE_APP_ID</key><string>1:0:ios:placeholder</string>
          </dict>
          </plist>
          PLIST
          fi

      - name: Capacitor sync (ios)
        working-directory: apps/web-app
        run: npx cap sync ios

      - name: Pod install
        working-directory: ios/App
        run: pod install --repo-update

      - name: Build .app for simulator (unsigned)
        working-directory: ios/App
        run: |
          set -o pipefail
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Locate App.app
        id: locate_app
        working-directory: ios/App
        run: |
          APP_PATH=$(find build/Build/Products -name 'App.app' -type d -print -quit)
          echo "Found: $APP_PATH"
          echo "app_path=ios/App/$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload iOS .app (simulator build)
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ${{ steps.locate_app.outputs.app_path }}
          if-no-files-found: error

  smoke-ios:
    name: Smoke test iOS (boot simulator + launch app)
    needs: build-ios
    if: github.event_name != 'workflow_dispatch' || inputs.smoke_test
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Download iOS app
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator-app
          path: artifacts/App.app

      - name: List available simulators
        run: xcrun simctl list devices available | head -40

      - name: Boot simulator and verify app launches
        run: |
          set -e
          DEVICE=$(xcrun simctl list devices available -j | \
            python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; \
              ids=[v['udid'] for k,arr in d.items() if 'iOS' in k for v in arr if v.get('isAvailable') and 'iPhone' in v['name']]; \
              print(ids[0] if ids else '')")
          if [ -z "$DEVICE" ]; then
            DEVICE=$(xcrun simctl create "ci-iphone" "iPhone 15")
          fi
          echo "Using simulator: $DEVICE"
          xcrun simctl boot "$DEVICE" || true
          xcrun simctl bootstatus "$DEVICE" -b
          xcrun simctl install "$DEVICE" artifacts/App.app
          xcrun simctl get_app_container "$DEVICE" com.routine.note app > /dev/null
          echo "App installed successfully"
          LAUNCH_OUT=$(xcrun simctl launch "$DEVICE" com.routine.note)
          echo "$LAUNCH_OUT"
          PID=$(echo "$LAUNCH_OUT" | awk -F': ' '/com.routine.note/ {print $2}')
          if [ -z "$PID" ] || [ "$PID" = "0" ]; then
            echo "::error::App did not launch"
            exit 1
          fi
          echo "App running with PID $PID"
          sleep 6
          xcrun simctl io "$DEVICE" screenshot ios-smoke-screenshot.png
          xcrun simctl shutdown "$DEVICE" || true

      - name: Upload smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-smoke-screenshot
          path: ios-smoke-screenshot.png
          if-no-files-found: warn
