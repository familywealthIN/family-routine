# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: grvpanchal
service: familywealth-graphql-api

plugins:
  - serverless-offline

build:
  esbuild: false

package:
  patterns:
    # Exclude everything by default, then include only what's needed
    - '!**'
    # Include server code and handlers
    - src/server/**
    - handler.js
    - serverless-mcp.js
    - server.js
    - secrets.json
    # Include only runtime node_modules (exclude all devDependencies and frontend-only deps)
    - node_modules/**
    # --- devDependencies ---
    - '!node_modules/@babel/**'
    - '!node_modules/@capacitor/assets/**'
    - '!node_modules/@mdi/**'
    - '!node_modules/@storybook/**'
    - '!node_modules/@vue/cli-*/**'
    - '!node_modules/@vue/eslint-*/**'
    - '!node_modules/@vue/test-utils/**'
    - '!node_modules/@vue/vue2-jest/**'
    - '!node_modules/babel-*/**'
    - '!node_modules/cross-env/**'
    - '!node_modules/css-loader/**'
    - '!node_modules/eslint*/**'
    - '!node_modules/ignore-loader/**'
    - '!node_modules/jest*/**'
    - '!node_modules/nodemon/**'
    - '!node_modules/serverless-offline/**'
    - '!node_modules/storybook/**'
    - '!node_modules/style-loader/**'
    - '!node_modules/stylus/**'
    - '!node_modules/stylus-loader/**'
    - '!node_modules/vue-cli-plugin-vuetify/**'
    - '!node_modules/vue-loader/**'
    - '!node_modules/vue-template-compiler/**'
    - '!node_modules/vuetify-loader/**'
    - '!node_modules/webpack*/**'
    # --- Frontend-only dependencies ---
    - '!node_modules/@capacitor/**'
    - '!node_modules/@codetrix-studio/**'
    - '!node_modules/@johmun/**'
    - '!node_modules/@vue/composition-api/**'
    - '!node_modules/apollo-*/**'
    - '!node_modules/vue/**'
    - '!node_modules/vue-*/**'
    - '!node_modules/vuetify/**'
    - '!node_modules/vuetify-confirm/**'
    - '!node_modules/vuedraggable/**'
    - '!node_modules/easymde/**'
    - '!node_modules/nosleep.js/**'
    - '!node_modules/register-service-worker/**'
    - '!node_modules/localforage/**'
    - '!node_modules/idb/**'
    - '!node_modules/isomorphic-unfetch/**'
    - '!node_modules/graphql-tag/**'
    # --- Large/unused at runtime ---
    - '!node_modules/aws-sdk/**'
    - '!node_modules/core-js/**'
    - '!node_modules/typescript/**'
    - '!node_modules/.cache/**'
    - '!node_modules/firebase/**'

custom:
  secrets: ${file(secrets.json)}
provider:
  name: aws
  runtime: nodejs18.x
  stage: dev
  region: ap-south-1
  timeout: 120 # increase default lambda timeout from 6s to 120s
  environment:
    MONGDO_DB: ${self:custom.secrets.MONGDO_DB}
    MONGDO_DEBUG: ${self:custom.secrets.MONGDO_DEBUG}
    GOOGLE_CLIENT_ID: ${self:custom.secrets.GOOGLE_CLIENT_ID}
    GOOGLE_CLIENT_KEY: ${self:custom.secrets.GOOGLE_CLIENT_KEY}
    GA_IOS_CLIENT_ID: ${self:custom.secrets.GA_IOS_CLIENT_ID}
    GA_CLIENT_ID: ${self:custom.secrets.GA_CLIENT_ID}
    JWT_SECRET: ${self:custom.secrets.JWT_SECRET}
    DOMAIN: ${self:custom.secrets.DOMAIN}
    ENCRYPTION_KEY: ${self:custom.secrets.ENCRYPTION_KEY}
    GEMINI_API_KEY: ${self:custom.secrets.GEMINI_API_KEY}
    OPENROUTER_API_KEY: ${self:custom.secrets.OPENROUTER_API_KEY}
    MCP_BASE_URL: ${self:custom.secrets.MCP_BASE_URL}

functions:
  query:
    handler: handler.handler
    events:
      - http:
          path: graphql
          method: post
          cors: true

  mcp:
    handler: serverless-mcp.handler
    events:
      - http:
          path: mcp
          method: get
          cors: true
      - http:
          path: mcp/call
          method: post
          cors: true
      - http:
          path: mcp/resources
          method: get
          cors: true
      - http:
          path: mcp/tools
          method: get
          cors: true
      - http:
          path: mcp/graphql
          method: post
          cors: true
