# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: grvpanchal
service: familywealth-graphql-api

plugins:
  - serverless-offline

build:
  esbuild: false

package:
  excludeDevDependencies: true
  patterns:
    # Exclude everything by default, then include only what's needed
    - '!**'
    # Include server code and handlers
    - src/**
    - handler.js
    - serverless-mcp.js
    - server.js
    - secrets.json
    # Include only runtime node_modules
    - node_modules/**
    # --- Workspace symlink loop ---
    # apps/server's package name is "server"; yarn hoists a symlink at
    # node_modules/server → apps/server, which would recurse forever during
    # packaging. Exclude it explicitly.
    - '!node_modules/server/**'
    # --- devDependencies ---
    - '!node_modules/@babel/**'
    - '!node_modules/babel*/**'
    - '!node_modules/cross-env/**'
    - '!node_modules/jest*/**'
    - '!node_modules/nodemon/**'
    - '!node_modules/serverless-offline/**'
    # --- Large/unused at runtime ---
    - '!node_modules/aws-sdk/**'
    - '!node_modules/typescript/**'
    - '!node_modules/.cache/**'
    # --- Strip unused files from packages ---
    - '!node_modules/**/*.md'
    - '!node_modules/**/*.ts'
    - '!node_modules/**/*.map'
    - '!node_modules/**/test/**'
    - '!node_modules/**/tests/**'
    - '!node_modules/**/__tests__/**'
    - '!node_modules/**/.bin/**'
    - '!node_modules/**/LICENSE'
    - '!node_modules/**/LICENSE.*'
    - '!node_modules/**/CHANGELOG*'
    - '!node_modules/**/.github/**'

custom:
  secrets: ${file(secrets.json)}
provider:
  name: aws
  runtime: nodejs18.x
  stage: dev
  region: ap-south-1
  timeout: 120 # increase default lambda timeout from 6s to 120s
  environment:
    MONGDO_DB: ${self:custom.secrets.MONGDO_DB}
    MONGDO_DEBUG: ${self:custom.secrets.MONGDO_DEBUG}
    GOOGLE_CLIENT_ID: ${self:custom.secrets.GOOGLE_CLIENT_ID}
    GOOGLE_CLIENT_KEY: ${self:custom.secrets.GOOGLE_CLIENT_KEY}
    GA_IOS_CLIENT_ID: ${self:custom.secrets.GA_IOS_CLIENT_ID}
    GA_CLIENT_ID: ${self:custom.secrets.GA_CLIENT_ID}
    JWT_SECRET: ${self:custom.secrets.JWT_SECRET}
    DOMAIN: ${self:custom.secrets.DOMAIN}
    ENCRYPTION_KEY: ${self:custom.secrets.ENCRYPTION_KEY}
    GEMINI_API_KEY: ${self:custom.secrets.GEMINI_API_KEY}
    OPENROUTER_API_KEY: ${self:custom.secrets.OPENROUTER_API_KEY}
    MCP_BASE_URL: ${self:custom.secrets.MCP_BASE_URL}

functions:
  query:
    handler: handler.handler
    events:
      - http:
          path: graphql
          method: post
          cors: true

  mcp:
    handler: serverless-mcp.handler
    events:
      - http:
          path: mcp
          method: get
          cors: true
      - http:
          path: mcp/call
          method: post
          cors: true
      - http:
          path: mcp/resources
          method: get
          cors: true
      - http:
          path: mcp/tools
          method: get
          cors: true
      - http:
          path: mcp/graphql
          method: post
          cors: true
